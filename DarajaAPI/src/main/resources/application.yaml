spring:
  application:
    name: DarajaAPI
server:
  port: 8080


  datasource:
    url: jdbc:h2:mem:darajadb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

# Daraja API Configuration
